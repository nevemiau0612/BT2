    while(masterData.length < 200) {
        masterData.push({
            q: `(第 ${masterData.length+1} 題) 經文內容載入中，請編輯 masterData 增加真題。`,
            a: ["選項 A", "選項 B", "選項 C", "選項 D"],
            c: 0
        });
    }

    let cur = 0, score = 0, lock = false;
    function render() {
        if(cur >= masterData.length) {
            document.getElementById('game').style.display='none';
            document.getElementById('res').style.display='block';
            document.getElementById('final').innerText = score + " / 200";
            return;
        }
        lock = false;
        const item = masterData[cur];
        document.getElementById('q').innerText = item.q;
        document.getElementById('counter').innerText = (cur+1) + " / 200";
        document.getElementById('bar').style.width = ((cur+1)/200*100) + "%";
        const box = document.getElementById('os');
        box.innerHTML = '';
        item.a.forEach((txt, i) => {
            const btn = document.createElement('button');
            btn.innerText = txt;
            btn.onclick = () => {
                if(lock) return; lock = true;
                if(i === item.c) { btn.classList.add('correct'); score++; }
                else { btn.classList.add('wrong'); box.children[item.c].classList.add('correct'); }
                setTimeout(() => { cur++; render(); }, 700);
            };
            box.appendChild(btn);
        });
    }
    render();
