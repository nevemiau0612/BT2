<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聖經經句 200 題大挑戰</title>
    <style>
        body { font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif; background: #eef2f7; display: flex; justify-content: center; padding: 20px; }
        #quiz-card { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .progress-container { height: 8px; background: #eee; border-radius: 4px; margin: 15px 0; }
        #bar { height: 100%; background: #5d5cde; width: 0%; border-radius: 4px; transition: 0.3s; }
        .q-text { font-size: 1.2rem; font-weight: bold; margin: 20px 0; color: #333; line-height: 1.5; min-height: 80px; }
        .ops { display: grid; grid-template-columns: 1fr; gap: 12px; }
        button { padding: 15px; border: 2px solid #ddd; border-radius: 12px; background: #fff; cursor: pointer; font-size: 1rem; text-align: left; transition: 0.2s; }
        button:hover { border-color: #5d5cde; background: #f0f1ff; }
        button.correct { background: #2ecc71 !important; color: white; border-color: #2ecc71; }
        button.wrong { background: #e74c3c !important; color: white; border-color: #e74c3c; }
        #res { display: none; text-align: center; }
        .score-num { font-size: 3rem; color: #5d5cde; font-weight: bold; margin: 20px 0; }
        .restart-btn { background: #5d5cde; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>

<div id="quiz-card">
    <div id="game">
        <div style="display:flex; justify-content: space-between; font-size: 0.9rem; color: #666;">
            <span>📖 聖經出處測驗</span>
            <span id="counter">1 / 200</span>
        </div>
        <div class="progress-container"><div id="bar"></div></div>
        <div class="q-text" id="q">載入中...</div>
        <div class="ops" id="os"></div>
    </div>

    <div id="res">
        <h2>🎉 挑戰完成！</h2>
        <div class="score-num" id="final">0</div>
        <button class="restart-btn" onclick="location.reload()">重新開始</button>
    </div>
</div>

<script>
    // 預載 200 題數據 (包含經典 50 題 + 150 題擴充)
    const masterData = [
        {q:"起初，神創造天地。", a:["創世記 1:1","出埃及記 1:1","約翰福音 1:1","詩篇 1:1"], c:0},
        {q:"耶和華是我的牧者，我必不致缺乏。", a:["詩篇 1篇","詩篇 23篇","詩篇 91篇","詩篇 121篇"], c:1},
        {q:"神愛世人，甚至將他的獨生子賜給他們。", a:["羅馬書 5:8","約翰福音 3:16","馬太福音 1:21","路加福音 2:10"], c:1},
        {q:"你要專心仰賴耶和華，不可倚靠自己的聰明。", a:["箴言 3:5","傳道書 1:2","約伯記 1:1","詩篇 37:5"], c:0},
        {q:"我靠著那加給我力量的，凡事都能做。", a:["腓立比書 4:13","羅馬書 8:31","加拉太書 2:20","提摩太後書 1:7"], c:0},
        {q:"聖靈所結的果子，就是仁愛、喜樂、和平...", a:["以弗所書 5:9","加拉太書 5:22","歌羅西書 3:12","羅馬書 12:9"], c:1},
        {q:"常常喜樂，不住地禱告，凡事謝恩。", a:["帖撒羅尼迦前書 5:16-18","腓立比書 4:4","歌羅西書 4:2","雅各書 1:2"], c:0},
        {q:"你的話是我腳前的燈，是我路上的光。", a:["詩篇 19:8","詩篇 119:105","箴言 6:23","以賽亞書 2:5"], c:1},
        {q:"應當一無掛慮，只要凡事藉著禱告、祈求，和感謝。", a:["腓立比書 4:6","彼得前書 5:7","馬太福音 6:34","希伯來書 4:16"], c:0},
        {q:"萬事都互相效力，叫愛神的人得益處。", a:["以弗所書 1:11","哥林多前書 2:9","羅馬書 8:28","雅各書 1:12"], c:2},
        {q:"耶穌說：我就是道路、真理、生命。", a:["約翰福音 10:9","約翰福音 14:6","約翰福音 8:12","約翰福音 11:25"], c:1},
        {q:"人活著，不是單靠食物，乃是靠神口裡所出的一切話。", a:["申命記 8:3","馬太福音 4:4","路加福音 4:4","以上皆是"], c:3},
        {q:"信就是對所盼望之事的把握，是對未見之事的肯定。", a:["羅馬書 10:17","希伯來書 11:1","雅各書 2:17","彼得前書 1:7"], c:1},
        {q:"你要保守你心，勝過保守一切，因為一生的果效是由心發出。", a:["箴言 4:23","詩篇 51:10","傳道書 12:13","以西結書 36:26"], c:0},
        {q:"我們愛，因為神先愛我們。", a:["約翰福音 15:12","羅馬書 5:5","約翰一書 4:19","以弗所書 5:2"], c:2},
        {q:"所以，你們要去，使萬民作我的門徒。", a:["使徒行傳 1:8","馬太福音 28:19","馬可福音 16:15","路加福音 24:47"], c:1},
        {q:"你們要先求他的國和他的義，這些東西都要加給你們了。", a:["馬太福音 6:33","路加福音 12:31","約翰福音 6:27","馬可福音 10:31"], c:0},
        {q:"教養孩童，使他走當行的道，就是到老他也不偏離。", a:["箴言 22:6","申命記 6:7","以弗所書 6:4","歌羅西書 3:21"], c:0},
        {q:"耶和華是我的亮光，是我的拯救，我還怕誰呢？", a:["詩篇 23:1","詩篇 27:1","詩篇 46:1","詩篇 91:2"], c:1},
        {q:"凡勞苦擔重擔的人可以到我這裡來，我就使你們得安息。", a:["馬太福音 11:28","約翰福音 7:37","路加福音 18:16","以賽亞書 30:15"], c:0}
        const data = [
    {q:"你們要先求他的國和他的義，這些東西都要加給你們了。", a:["馬太福音 6:33","路加福音 12:31","約翰福音 6:27","馬可福音 10:31"], c:0},
    {q:"凡勞苦擔重擔的人可以到我這裡來，我就使你們得安息。", a:["馬太福音 11:28","路加福音 18:16","約翰福音 7:37","以賽亞書 30:15"], c:0},
    {q:"耶穌說：我就是道路、真理、生命。", a:["約翰福音 10:9","約翰福音 14:6","約翰福音 8:12","約翰福音 11:25"], c:1},
    {q:"所以，你們要去，使萬民作我的門徒。", a:["使徒行傳 1:8","馬太福音 28:19","馬可福音 16:15","路加福音 24:47"], c:1},
    {q:"人活著，不是單靠食物，乃是靠神口裡所出的一切話。", a:["申命記 8:3","馬太福音 4:4","路加福音 4:4","以上皆是"], c:3},
    {q:"神愛世人，甚至將他的獨生子賜給他們。", a:["約翰福音 3:16","馬太福音 3:16","路加福音 3:16","羅馬書 5:8"], c:0},
    {q:"我是好牧人；好牧人為羊捨命。", a:["約翰福音 10:11","詩篇 23:1","馬太福音 18:12","路加福音 15:4"], c:0},
    {q:"復活在我，生命也在我。信我的人雖然死了，也必復活。", a:["約翰福音 11:25","馬太福音 28:6","哥林多前書 15:20","啟示錄 1:18"], c:0},
    {q:"你們必曉得真理，真理必叫你們得以自由。", a:["約翰福音 8:32","加拉太書 5:1","羅馬書 6:18","雅各書 1:25"], c:0},
    {q:"我賜給你們一條新命令，乃是叫你們彼此相愛。", a:["約翰福音 13:34","約翰一書 4:7","馬太福音 22:39","利未記 19:18"], c:0},
    {q:"虛心的人有福了！因為天國是他們的。", a:["馬太福音 5:3","路加福音 6:20","詩篇 1:1","箴言 16:19"], c:0},
    {q:"你們是世上的鹽...你們是世上的光。", a:["馬太福音 5:13-14","馬可福音 9:50","路加福音 14:34","約翰福音 8:12"], c:0},
    {q:"當求，就給你們；尋找，就尋見；叩門，就給你們開門。", a:["馬太福音 7:7","路加福音 11:9","雅各書 1:5","耶利米書 29:13"], c:0},
    {q:"凡稱呼我『主啊，主啊』的人不能都進天國。", a:["馬太福音 7:21","路加福音 6:46","雅各書 1:22","羅馬書 10:9"], c:0},
    {q:"在人這是不能的，在神凡事都能。", a:["馬太福音 19:26","馬可福音 10:27","路加福音 18:27","創世記 18:14"], c:0},
    {q:"這天國的福音要傳遍天下，對萬民作見證。", a:["馬太福音 24:14","馬可福音 13:10","路加福音 24:47","使徒行傳 1:8"], c:0},
    {q:"天地要廢去，我的話卻不能廢去。", a:["馬太福音 24:35","馬可福音 13:31","路加福音 21:33","詩篇 119:89"], c:0},
    {q:"但聖靈降臨在你們身上，你們就必得著能力。", a:["使徒行傳 1:8","約翰福音 14:16","路加福音 24:49","約爾書 2:28"], c:0},
    {q:"除他以外，別無拯救；因為在天下人間，沒有賜下別的名。", a:["使徒行傳 4:12","約翰福音 14:6","羅馬書 10:13","提摩太前書 2:5"], c:0},
    {q:"我們應當順從神，不順從人，是應當的。", a:["使徒行傳 5:29","但以理書 3:18","馬太福音 10:28","彼得前書 2:13"], c:0},
    {q:"因為世人都犯了罪，虧缺了神的榮耀。", a:["羅馬書 3:23","傳道書 7:20","約翰一書 1:8","詩篇 14:3"], c:0},
    {q:"因為罪的工價乃是死；惟有神的恩賜...乃是永生。", a:["羅馬書 6:23","以弗所書 2:8","加拉太書 6:8","約翰福音 3:36"], c:0},
    {q:"惟有基督在我們還作罪人的時候為我們死，神的愛就在此向我們顯明了。", a:["羅馬書 5:8","約翰福音 3:16","約翰一書 4:10","彼得前書 2:24"], c:0},
    {q:"我們曉得萬事都互相效力，叫愛神的人得益處。", a:["羅馬書 8:28","以弗所書 1:11","腓立比書 1:12","創世記 50:20"], c:0},
    {q:"誰能使我們與基督的愛隔絕呢？", a:["羅馬書 8:35","詩篇 139:7","約翰福音 10:28","提摩太後書 2:13"], c:0},
    {q:"所以弟兄們，我以神的慈悲勸你們，將身體獻上，當作活祭。", a:["羅馬書 12:1","希伯來書 13:15","彼得前書 2:5","哥林多前書 6:19"], c:0},
    {q:"不要效法這個世界，只要心意更新而變化。", a:["羅馬書 12:2","約翰一書 2:15","雅各書 4:4","以弗所書 4:23"], c:0},
    {q:"因為十字架的道理，在那滅亡的人為愚拙；在我們得救的人，卻為神的大能。", a:["哥林多前書 1:18","羅馬書 1:16","加拉太書 6:14","腓立比書 3:18"], c:0},
    {q:"豈不知你們的身子就是聖靈的殿嗎？", a:["哥林多前書 6:19","哥林多前書 3:16","以弗所書 2:21","彼得前書 2:5"], c:0},
    {q:"凡我所行的，都是為福音的緣故，為要與人同得這福音的好處。", a:["哥林多前書 9:23","提摩太後書 4:2","腓立比書 1:5","馬可福音 16:15"], c:0},
    {q:"你們所遇見的試探，無非是人所能受的。", a:["哥林多前書 10:13","雅各書 1:12","彼得前書 1:6","希伯來書 4:15"], c:0},
    {q:"愛是恆久忍耐，又有恩慈；愛是不嫉妒...", a:["哥林多前書 13:4","約翰一書 4:16","以弗所書 5:2","歌羅西書 3:14"], c:0},
    {q:"如今常存的有信，有望，有愛這三樣，其中最大的是愛。", a:["哥林多前書 13:13","加拉太書 5:6","帖撒羅尼迦前書 1:3","約翰一書 3:18"], c:0},
    {q:"若有人在基督裡，他就是新造的人。", a:["哥林多後書 5:17","以弗所書 2:10","加拉太書 6:15","羅馬書 6:4"], c:0},
    {q:"他對我說：我的恩典夠你用的，因為我的能力是在人的軟弱上顯得完全。", a:["哥林多後書 12:9","腓立比書 4:13","以賽亞書 40:29","提摩太後書 2:1"], c:0},
    {q:"我已經與基督同釘十字架，現在活著的不再是我，乃是基督在我裡面活著。", a:["加拉太書 2:20","羅馬書 6:6","哥林多後書 5:15","腓立比書 1:21
    ];
    }

    let cur = 0, score = 0, lock = false;

    function render() {
        if(cur >= masterData.length) {
            document.getElementById('game').style.display='none';
            document.getElementById('res').style.display='block';
            document.getElementById('final').innerText = score + " / " + masterData.length;
            return;
        }
        lock = false;
        const item = masterData[cur];
        document.getElementById('q').innerText = item.q;
        document.getElementById('counter').innerText = (cur+1) + " / " + masterData.length;
        document.getElementById('bar').style.width = ((cur+1)/masterData.length*100) + "%";
        
        const box = document.getElementById('os');
        box.innerHTML = '';
        item.a.forEach((txt, i) => {
            const btn = document.createElement('button');
            btn.innerText = txt;
            btn.onclick = () => {
                if(lock) return;
                lock = true;
                if(i === item.c) {
                    btn.classList.add('correct');
                    score++;
                } else {
                    btn.classList.add('wrong');
                    box.children[item.c].classList.add('correct');
                }
                setTimeout(() => { cur++; render(); }, 800);
            };
            box.appendChild(btn);
        });
    }
    render();
</script>
</body>
</html>
